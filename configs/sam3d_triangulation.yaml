# Triangulate SAM3D-Body 2D keypoints using split_cycle alignment records.

data_root: ${oc.env:GYMNASTICS_DATA_ROOT,/home/data/xchen/gymnastics}

paths:
  sam3d_person_root: ${data_root}/sam3d_body_results/person
  split_cycle_root: ${data_root}/split_cycle
  output_root: ${data_root}/sam3d_triangulated/person

camera_K:
  K:
    - [1710.4629148432577, 0.0, 550.11524355156632]
    - [0.0, 1711.318414718867, 896.8609628805682]
    - [0.0, 0.0, 1.0]
  distortion_coefficients:
    [0.17697328, -0.45675065, -0.0026601, -0.00330938, 0.35538705]
  image_size: [1080, 1920] # (width, height)

camera_position:
  T: [0.0, 0.0, 1.5]
  r: 3.5
  z: 1.5
  yaws:
    1: -90.0
    2: -45.0
    3: 0.0
    4: -135.0

view_camera:
  face: 3
  side: 1

visualization:
  save_frames: true
  vis_stride: 1
  make_video: true
  fps: 30
